<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LinkedIn Name Extractor Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ Settings</h1>
            <p class="subtitle">LinkedIn Name Extractor</p>
        </div>

        <div class="section">
            <label for="messageTemplate">
                <strong>Custom Message Template</strong>
                <span class="help-text">Use {name} as placeholder for the person's first name</span>
            </label>
            <textarea 
                id="messageTemplate" 
                rows="4" 
                placeholder="Hi, {name}&#10;&#10;I hope this message finds you well..."
            ></textarea>
            
            <div class="examples">
                <p class="label">Examples:</p>
                <div class="example-item" data-template="Hi, {name} ">
                    <code>Hi, {name} </code>
                    <span class="desc">(Simple greeting)</span>
                </div>
                <div class="example-item" data-template="Hi, {name}&#10;&#10;I hope this message finds you well! ">
                    <code>Hi, {name} with line break</code>
                    <span class="desc">(With spacing)</span>
                </div>
                <div class="example-item" data-template="Hello {name},&#10;&#10;I came across your profile and wanted to reach out. ">
                    <code>Full intro template</code>
                    <span class="desc">(Professional)</span>
                </div>
            </div>
        </div>

        <div class="section preview-section">
            <label><strong>Preview</strong></label>
            <div class="preview-box">
                <span id="preview">Hi, John </span>
            </div>
        </div>

        <div class="actions">
            <button id="saveButton" class="btn-primary">Save Settings</button>
            <button id="resetButton" class="btn-secondary">Reset to Default</button>
        </div>

        <div id="status" class="status"></div>

        <div class="footer">
            <p>💡 Tip: The custom message will appear when you click in a LinkedIn message box</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
